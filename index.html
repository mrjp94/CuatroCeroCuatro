<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="404 Microbrewery link hub for Instagram, email, and future social links."
    />
    <title>404 | Page Not Found</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <div class="ambient ambient-left"></div>
      <div class="ambient ambient-right"></div>

      <main class="card">
        <div class="brand-stack">
          <img
            class="brand-logo"
            src="./assets/CuatroCeroCuatroLogo.png"
            alt="Cuatro Cero Cuatro 404 logo"
          />
          <div class="brand-copy">
            <p class="eyebrow">404 / Error Channel Open</p>
            <h1>Beer found.</h1>
          </div>
        </div>

        <figure class="brand-banner" aria-label="Cuatro Cero Cuatro banner">
          <img
            src="./assets/CuatroCeroCuatroBanner.png"
            alt="Cuatro Cero Cuatro banner"
          />
        </figure>

        <section>
          <p class="intro">
            Cerveza artesanal desde Tijuana, B.C.
            Cervecero - Juan Pablo Salcedo Jackez.
          </p>
          <div class="section-heading">
            <h2>Links</h2>
            <p>Current channels</p>
          </div>
          <div id="links" class="links" aria-live="polite"></div>
        </section>
      </main>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
